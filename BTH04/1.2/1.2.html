<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Exercise 1.2</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>Quản Lý Điểm Sinh Viên</h2>

    <div class="form">
        <input type="text" id="name" placeholder="Họ tên">
        <input type="text" id="score" placeholder="Điểm (0-10)">
        <button id="addBtn">Thêm</button>
    </div>

    <input type="text" id="searchInput" placeholder="Tìm kiếm tên sinh viên">

    <select id="filterRank">
        <option value="all">Tất cả</option>
        <option value="Giỏi">Giỏi</option>
        <option value="Khá">Khá</option>
        <option value="Trung bình">Trung bình</option>
        <option value="Yếu">Yếu</option>
    </select>

    <br><br>

    <table border="1">

        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th id="sortScore">Điểm</th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>

        <tbody id="tableBody">
        </tbody>

    </table>

    <p id="stats"></p>

    <script src="script.js"></script>

</body>

</html>
